<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications — ServiceMate</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#080B14;--surface:#0F1320;--surface2:#161C2E;--border:rgba(255,255,255,0.07);--white:#FFFFFF;--muted:rgba(255,255,255,0.45);--brand:#4F7EFF;--brand2:#8B5CF6;--green:#22D3A5;--accent:#FF6B6B;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;}
  nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:64px;background:rgba(8,11,20,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
  .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;letter-spacing:-0.5px;}
  .logo span{background:linear-gradient(135deg,var(--brand),var(--brand2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .btn-back{padding:7px 16px;border-radius:100px;border:1px solid var(--border);background:transparent;font-family:'DM Sans';font-size:13px;color:var(--muted);cursor:pointer;text-decoration:none;transition:all 0.2s;}
  .btn-back:hover{border-color:rgba(255,255,255,0.2);color:var(--white);}

  main{max-width:700px;margin:0 auto;padding:2.5rem 2rem;}
  .page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:12px;}
  .page-title{font-family:'Syne',sans-serif;font-size:1.75rem;font-weight:800;letter-spacing:-0.5px;margin-bottom:4px;}
  .page-sub{font-size:14px;color:var(--muted);}

  /* Empty state */
  .empty{text-align:center;padding:5rem 2rem;color:var(--muted);}
  .empty-icon{font-size:3rem;margin-bottom:1rem;}

  /* Notification card */
  .notif-card{display:flex;align-items:flex-start;gap:16px;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:18px 20px;margin-bottom:12px;transition:all 0.2s;position:relative;overflow:hidden;}
  .notif-card.unread{border-left:3px solid var(--brand);background:var(--surface2);}
  .notif-icon{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,rgba(79,126,255,0.2),rgba(139,92,246,0.2));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
  .notif-icon.booking{background:rgba(34,211,165,0.12);}
  .notif-icon.info{background:rgba(79,126,255,0.12);}
  .notif-body{flex:1;min-width:0;}
  .notif-msg{font-size:14px;line-height:1.5;margin-bottom:5px;}
  .notif-time{font-size:12px;color:var(--muted);}
  .notif-dot{width:8px;height:8px;border-radius:50%;background:var(--brand);flex-shrink:0;margin-top:8px;}

  /* Type badges */
  .type-BOOKING{color:var(--green);}
  .type-INFO{color:var(--brand);}
  .type-ALERT{color:var(--accent);}
</style>
</head>
<body>
<nav>
  <div class="logo">Service<span>Mate</span></div>
  <a href="/dashboard" class="btn-back">← Dashboard</a>
</nav>

<main>
  <div class="page-header">
    <div>
      <h1 class="page-title">🔔 Notifications</h1>
      <p class="page-sub" th:text="'Hello ' + ${user.fullName} + ', here are your latest updates'">Updates</p>
    </div>
  </div>

  <!-- Empty -->
  <div th:if="${notifications.empty}" class="empty">
    <div class="empty-icon">🔕</div>
    <p>No notifications yet. They'll appear here when you make bookings.</p>
  </div>

  <!-- Notification list -->
  <div th:unless="${notifications.empty}">
    <div th:each="n : ${notifications}"
         th:class="${n.read} ? 'notif-card' : 'notif-card unread'">

      <div th:class="${'notif-icon ' + n.type.toLowerCase()}">
        <span th:if="${n.type == 'BOOKING'}">📋</span>
        <span th:if="${n.type == 'INFO'}">ℹ️</span>
        <span th:if="${n.type == 'ALERT'}">⚠️</span>
        <span th:unless="${n.type == 'BOOKING' or n.type == 'INFO' or n.type == 'ALERT'}">🔔</span>
      </div>

      <div class="notif-body">
        <div class="notif-msg" th:text="${n.message}">Notification message</div>
        <div class="notif-time" th:text="${#temporals.format(n.createdAt, 'dd MMM yyyy, hh:mm a')}">Date</div>
      </div>

      <div class="notif-dot" th:unless="${n.read}"></div>
    </div>
  </div>
</main>
</body>
</html>
