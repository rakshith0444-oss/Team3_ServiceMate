<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Confirmed — ServiceMate</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#080B14;--surface:#0F1320;--surface2:#161C2E;--border:rgba(255,255,255,0.07);--white:#FFFFFF;--muted:rgba(255,255,255,0.45);--brand:#4F7EFF;--brand2:#8B5CF6;--green:#22D3A5;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:28px;padding:3rem;max-width:480px;width:100%;text-align:center;animation:fadeUp 0.5s ease both;}
  .success-icon{width:72px;height:72px;border-radius:50%;background:rgba(34,211,165,0.12);border:2px solid rgba(34,211,165,0.3);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 1.5rem;}
  h1{font-family:'Syne',sans-serif;font-size:1.75rem;font-weight:800;letter-spacing:-0.5px;margin-bottom:0.5rem;}
  .sub{font-size:15px;color:var(--muted);margin-bottom:2rem;line-height:1.6;}
  .details{background:var(--surface2);border-radius:16px;padding:1.25rem;text-align:left;margin-bottom:2rem;}
  .detail-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px;}
  .detail-row:last-child{border-bottom:none;}
  .detail-label{color:var(--muted);}
  .detail-val{font-weight:500;color:var(--white);}
  .status-badge{padding:3px 10px;border-radius:100px;background:rgba(255,200,0,0.12);border:1px solid rgba(255,200,0,0.3);color:#FFD700;font-size:12px;font-weight:500;}
  .actions{display:flex;gap:12px;justify-content:center;}
  .btn{padding:12px 24px;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;text-decoration:none;transition:all 0.2s;border:none;}
  .btn-primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:var(--white);}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(79,126,255,0.4);}
  .btn-ghost{background:var(--surface2);color:var(--white);border:1px solid var(--border);}
  .btn-ghost:hover{border-color:rgba(255,255,255,0.2);}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="card">
  <div class="success-icon">✅</div>
  <h1>Booking Confirmed!</h1>
  <p class="sub" th:text="'Your ' + ${#strings.replace(booking.provider.category, '-', ' ')} + ' has been booked with ' + ${booking.provider.name} + '. The professional will arrive at your address on time.'">Your service has been booked.</p>

  <div class="details">
    <div class="detail-row">
      <span class="detail-label">Technician</span>
      <span class="detail-val" th:text="${booking.provider.name}">Name</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Date</span>
      <span class="detail-val" th:text="${booking.bookingDate}">Date</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Time</span>
      <span class="detail-val" th:text="${booking.bookingTime}">Time</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Address</span>
      <span class="detail-val" th:text="${booking.address}">Address</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Status</span>
      <span class="status-badge">PENDING</span>
    </div>
  </div>

  <div class="actions">
    <a href="/my-bookings" class="btn btn-primary">View My Bookings</a>
    <a href="/dashboard" class="btn btn-ghost">Back to Home</a>
  </div>
</div>
</body>
</html>
