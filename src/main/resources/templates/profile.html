<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile — ServiceMate</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#080B14;--surface:#0F1320;--surface2:#161C2E;--border:rgba(255,255,255,0.07);--white:#FFFFFF;--muted:rgba(255,255,255,0.45);--brand:#4F7EFF;--brand2:#8B5CF6;--green:#22D3A5;--accent:#FF6B6B;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;}
  nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:64px;background:rgba(8,11,20,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
  .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.3rem;letter-spacing:-0.5px;}
  .logo span{background:linear-gradient(135deg,var(--brand),var(--brand2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .nav-right{display:flex;align-items:center;gap:12px;}
  .btn-nav{padding:7px 16px;border-radius:100px;border:1px solid var(--border);background:transparent;font-family:'DM Sans';font-size:13px;color:var(--muted);cursor:pointer;text-decoration:none;transition:all 0.2s;}
  .btn-nav:hover{border-color:rgba(255,255,255,0.2);color:var(--white);}
  .notif-btn{position:relative;}
  .badge{position:absolute;top:-4px;right:-4px;background:var(--accent);border-radius:50%;width:16px;height:16px;font-size:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;}

  main{max-width:760px;margin:0 auto;padding:2.5rem 2rem;}
  .page-header{margin-bottom:2rem;}
  .page-title{font-family:'Syne',sans-serif;font-size:1.75rem;font-weight:800;letter-spacing:-0.5px;margin-bottom:4px;}
  .page-sub{font-size:14px;color:var(--muted);}

  /* Avatar */
  .avatar-section{display:flex;align-items:center;gap:20px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:20px;}
  .avatar{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,var(--brand),var(--brand2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:28px;font-weight:800;flex-shrink:0;}
  .avatar-info .name{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;}
  .avatar-info .email{font-size:13px;color:var(--muted);margin-top:2px;}
  .role-badge{display:inline-block;margin-top:8px;padding:3px 12px;border-radius:100px;font-size:12px;font-weight:500;background:rgba(79,126,255,0.12);border:1px solid rgba(79,126,255,0.3);color:var(--brand);}

  /* Cards */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:20px;}
  .card-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;margin-bottom:20px;display:flex;align-items:center;gap:8px;}

  /* Form fields */
  .field-group{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .field label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;}
  .field input{padding:12px 16px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);color:var(--white);font-family:'DM Sans';font-size:14px;transition:all 0.2s;outline:none;}
  .field input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(79,126,255,0.15);}
  .field input[readonly]{opacity:0.5;cursor:not-allowed;}
  .btn-save{padding:12px 28px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff;font-family:'DM Sans';font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s;}
  .btn-save:hover{opacity:0.9;transform:translateY(-1px);}

  /* Alerts */
  .alert-success{background:rgba(34,211,165,0.1);border:1px solid rgba(34,211,165,0.3);border-radius:12px;padding:12px 16px;font-size:14px;color:var(--green);margin-bottom:16px;}
  .alert-error{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3);border-radius:12px;padding:12px 16px;font-size:14px;color:var(--accent);margin-bottom:16px;}
  @media(max-width:580px){.field-group{grid-template-columns:1fr;}}
</style>
</head>
<body>
<nav>
  <div class="logo">Service<span>Mate</span></div>
  <div class="nav-right">
    <a href="/notifications" class="btn-nav notif-btn">
      🔔
      <span class="badge" th:if="${unreadCount > 0}" th:text="${unreadCount}"></span>
    </a>
    <a href="/dashboard" class="btn-nav">Dashboard</a>
    <a href="/logout" class="btn-nav">Logout</a>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1 class="page-title">My Profile</h1>
    <p class="page-sub">Manage your personal information and account settings</p>
  </div>

  <!-- Avatar card -->
  <div class="avatar-section">
    <div class="avatar" th:text="${user.fullName.substring(0,1).toUpperCase()}">A</div>
    <div class="avatar-info">
      <div class="name" th:text="${user.fullName}">Full Name</div>
      <div class="email" th:text="${user.email}">email@example.com</div>
      <span class="role-badge" th:text="${user.role.toUpperCase()}">CUSTOMER</span>
    </div>
  </div>

  <!-- Flash messages -->
  <div class="alert-success" th:if="${success}" th:text="${success}"></div>
  <div class="alert-success" th:if="${pwdSuccess}" th:text="${pwdSuccess}"></div>
  <div class="alert-error" th:if="${pwdError}" th:text="${pwdError}"></div>

  <!-- ── Edit Profile ──────────────────────────────────────────────────── -->
  <div class="card">
    <div class="card-title">✏️ Edit Profile</div>
    <form action="/profile/update" method="post">
      <div class="field-group">
        <div class="field">
          <label>Full Name</label>
          <input type="text" name="fullName" th:value="${user.fullName}" required>
        </div>
        <div class="field">
          <label>Email (cannot change)</label>
          <input type="email" th:value="${user.email}" readonly>
        </div>
        <div class="field">
          <label>Phone Number</label>
          <input type="tel" name="phone" th:value="${user.phone}" placeholder="9876543210">
        </div>
        <div class="field">
          <label>Role</label>
          <input type="text" th:value="${user.role.toUpperCase()}" readonly>
        </div>
      </div>
      <button type="submit" class="btn-save">Save Changes</button>
    </form>
  </div>

  <!-- ── Change Password ────────────────────────────────────────────────── -->
  <div class="card">
    <div class="card-title">🔑 Change Password</div>
    <form action="/profile/change-password" method="post">
      <div class="field-group">
        <div class="field">
          <label>Current Password</label>
          <input type="password" name="currentPassword" placeholder="Enter current password" required>
        </div>
        <div class="field">
          <label>New Password</label>
          <input type="password" name="newPassword" placeholder="Min. 6 characters" required>
        </div>
        <div class="field">
          <label>Confirm New Password</label>
          <input type="password" name="confirmPassword" placeholder="Re-enter new password" required>
        </div>
      </div>
      <button type="submit" class="btn-save">Update Password</button>
    </form>
  </div>

</main>
</body>
</html>
