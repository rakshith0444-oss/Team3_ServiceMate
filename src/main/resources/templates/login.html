<!DOCTYPE html>
<html>
<head>
<title>ServiceMate Login</title>

<style>

body{
font-family: Arial;
background: linear-gradient(to right,#4facfe,#00f2fe);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0px 5px 20px rgba(0,0,0,0.2);
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#4facfe;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#007bff;
}

a{
text-decoration:none;
color:#007bff;
}

</style>

</head>

<body>

<div class="container">

<h2>ServiceMate Login</h2>

<p style="color:red;" th:text="${message}"></p>

<form action="/login" method="post">

<input type="email" name="email" placeholder="Email">

<input type="password" name="password" placeholder="Password">

<button type="submit">Login</button>

</form>

<br>

<a href="/signup">Create an account</a>

</div>

</body>
</html>
